name: CI

on:
  push:
    paths:
      - "maas-html/**"
      - ".github/workflows/ci.yml"
      - ".github/workflows/pages.yml"
  pull_request:
    paths:
      - "maas-html/**"
      - ".github/workflows/ci.yml"
      - ".github/workflows/pages.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: maas-html
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v6
      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Configurar pnpm
        uses: pnpm/action-setup@v4.4.0
        with:
          version: 10
      - name: Configurar Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: maas-html/pnpm-lock.yaml
      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile
      - name: Preparar contenido determinista
        run: pnpm run content:build
      - name: Probar contratos y pipeline
        run: pnpm run test:python
      - name: Probar TypeScript y renderer
        run: pnpm test
      - name: Construir player
        run: pnpm run build
      - name: Verificar publicacion HTML-first
        run: pnpm run verify:publication
      - name: Probar e2e
        run: pnpm run test:e2e
