name: Publicar catálogo MAAS en GitHub Pages

on:
  push:
    branches:
      - main
      - codex/maas-html-media-real
    paths:
      - "maas-html/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: maas-html
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v6
      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Configurar pnpm
        uses: pnpm/action-setup@v4.4.0
        with:
          version: 10
      - name: Configurar Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: maas-html/pnpm-lock.yaml
      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile
      - name: Preparar episodio y media real
        run: pnpm run content:build
      - name: Probar contratos y catálogo
        run: pnpm run test:python
      - name: Probar interfaz y efectos
        run: pnpm test
      - name: Construir para Pages
        run: pnpm run build:pages
      - name: Verificar contrato HTML-first
        run: pnpm run verify:publication
      - name: Configurar Pages
        uses: actions/configure-pages@v6
      - name: Subir artefacto
        uses: actions/upload-pages-artifact@v5
        with:
          path: maas-html/dist/player

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publicar
        id: deployment
        uses: actions/deploy-pages@v5
